[pytest]
# Pytest configuration for Identity Manager API Lambda

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests

# Markers
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (requires external services)
    docker: Tests that require Docker
    tunnel: Tests that require SSH tunnel
    e2e: End-to-end tests in AWS
    slow: Slow running tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=services
    --cov=utils
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    -p no:warnings

# Coverage options
[coverage:run]
source = services,utils
omit = 
    */tests/*
    */test_*
    */__pycache__/*
    */site-packages/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
